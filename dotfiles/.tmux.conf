# Minimal tmux — grayscale with navy/blue highlights.
# Cross-OS (OpenBSD base / Debian / macOS); no per-OS markers needed.

# ── Behavior ──
set -g  default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"   # truecolor passthrough
set -g  base-index 1
setw -g pane-base-index 1
set -g  renumber-windows on
set -g  mouse on
set -g  history-limit 20000
set -sg escape-time 10
set -g  focus-events on
set -g  status-justify left

# ── Bindings ──
# Splits keep the current path; pane focus mirrors the i3/sway layout (j/k/i/l).
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind j select-pane -L
bind k select-pane -D
bind i select-pane -U
bind l select-pane -R
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# ── Palette: grayscale + navy (#1f2d4d) / light blue (#8fb6e0,#bcd6f2) ──
set -g  status-style "bg=#000000,fg=#999999"
set -g  status-left ""
set -g  status-right "#[fg=#8fb6e0]#S #[fg=#666666]| #[fg=#cccccc]%Y-%m-%d %H:%M "
set -g  status-right-length 60
setw -g window-status-format         "#[fg=#666666] #I #W "
setw -g window-status-current-format "#[bg=#1f2d4d,fg=#bcd6f2,bold] #I #W "
set -g  pane-border-style        "fg=#333333"
set -g  pane-active-border-style "fg=#8fb6e0"
set -g  message-style "bg=#1f2d4d,fg=#ffffff"
set -g  mode-style    "bg=#1f2d4d,fg=#ffffff"
