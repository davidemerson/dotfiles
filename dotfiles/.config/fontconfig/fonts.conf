<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Berkeley Mono Variable NNIX is THE monospace font everywhere.
       Mapping the generic "monospace" family makes every fontconfig
       client (GTK apps, Firefox monospace, editors, etc.) inherit it. -->
  <alias>
    <family>monospace</family>
    <prefer><family>Berkeley Mono Variable NNIX</family></prefer>
  </alias>

  <!-- Answer bare "Berkeley Mono" requests with the installed family name. -->
  <match target="pattern">
    <test name="family"><string>Berkeley Mono</string></test>
    <edit name="family" mode="assign" binding="strong">
      <string>Berkeley Mono Variable NNIX</string>
    </edit>
  </match>
</fontconfig>
