# workstation.conf — where the `workstation` command (~/.local/bin/workstation)
# connects. Sourced as shell by the script. provision.sh seeds this file once
# and never overwrites it on re-provision, so per-machine values here are safe.
# The copy tracked in the (public) dotfiles repo is intentionally blank —
# fill in real values on each machine; `workstation` refuses to run until
# REMOTE_USER, KEY, and PRIMARY_HOST are set.

# Remote login: user on the workstation, and the SSH private key to use.
REMOTE_USER=""
KEY=""                # e.g. "$HOME/.ssh/id_workstation.pem"

# Agent fingerprint of KEY (second field of `ssh-add -l`), used to skip a
# redundant passphrase prompt when the key is already loaded. Leave empty to
# derive it from KEY's sibling .pub file when one exists.
KEY_FP=""

# Primary path — tried first in auto mode. LABEL doubles as the CLI argument
# (`workstation <label>`); ALIAS is a Host entry ensured in ~/.ssh/config
# (leave empty to skip creating one).
PRIMARY_LABEL="primary"
PRIMARY_HOST=""       # e.g. "workstation.overlay.example.net"
PRIMARY_ALIAS=""

# Optional fallback path — tried automatically when the primary is
# unreachable. Leave FALLBACK_HOST empty if there is only one way in.
FALLBACK_LABEL="fallback"
FALLBACK_HOST=""
FALLBACK_ALIAS=""
